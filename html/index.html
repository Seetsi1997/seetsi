<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seetsi — Portfolio</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="/css/mediaquery.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Outfit:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
</head>

<body>
  <!-- Loader -->
  <div id="skeleton-loader">
    <div class="loader-wrapper">
      <div class="dot-loader">
        <span class="dots"></span>
        <span class="dots"></span>
        <span class="dots"></span>
      </div>
    </div>
  </div>

  <!-- Content slots -->
  <div id="slot-navbar"></div>
  <div id="slot-hero"></div>
  <div id="slot-experience"></div>
  <div id="slot-projects"></div>
  <div id="slot-testimonial"></div>
  <div id="slot-edu-skills"></div>
  <div id="slot-footer"></div>
  <div id="slot-popups"></div>

  <script>
    // ---- RECORD START TIME ----
    const startTime = Date.now();
    const MIN_DISPLAY_MS = 9000;        // 9 seconds
    const SAFETY_TIMEOUT_MS = MIN_DISPLAY_MS + 10000; // 19 seconds (safe buffer)

    // ---- Helper to hide loader only after minimum time ----
    function hideLoaderWhenReady() {
      const loader = document.getElementById('skeleton-loader');
      if (!loader) return;

      const elapsed = Date.now() - startTime;
      const remaining = MIN_DISPLAY_MS - elapsed;

      if (remaining <= 0) {
        loader.classList.add('hidden');
      } else {
        setTimeout(() => {
          loader.classList.add('hidden');
        }, remaining);
      }
    }

    // ---- Partial loading ----
    async function loadPartial(slotId, file) {
      try {
        const res = await fetch(file);
        if (!res.ok) {
          console.warn(`Partial not found: ${file}`);
          return;
        }
        const html = await res.text();
        document.getElementById(slotId).innerHTML = html;
      } catch (err) {
        console.warn(`Failed to load partial: ${file}`, err);
      }
    }

    async function init() {
      await loadPartial("slot-navbar", "/html/partials/navbar.html");
      await loadPartial("slot-hero", "/html/partials/hero.html");
      await loadPartial("slot-experience", "/html/partials/experience.html");
      await loadPartial("slot-projects", "/html/partials/projects.html");
      await loadPartial("slot-testimonial", "/html/partials/testimonial.html");
      await loadPartial("slot-edu-skills", "/html/partials/edu-skills.html");
      await loadPartial("slot-footer", "/html/partials/footer.html");
      await loadPartial("slot-popups", "/html/partials/popups.html");

      const scripts = [
        "/js/script.js",
        "/js/scroll-lock.js",
        "/js/openEduPopup.js",
        "/js/openDoc.js",
        "/js/openCertPanel.js",
        "/js/dateFooter.js",
        "/js/experienceSlider.js",
        "/js/projectSlider.js",
        "/js/testimonialSlider.js",
        "/js/connectionSlider.js",
        "/js/skillsView.js"
      ];

      for (const src of scripts) {
        await new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = src;
          s.onload = resolve;
          s.onerror = reject;
          document.body.appendChild(s);
        });
      }

      hideLoaderWhenReady();
      window.dispatchEvent(new Event("partialsLoaded"));
    }

    // ---- Start loading ----
    init().catch(function (err) {
      console.error('Portfolio failed to initialise:', err);
      hideLoaderWhenReady();
    });

    // ---- Safety fallback (much longer than min display) ----
    setTimeout(function() {
      const loader = document.getElementById('skeleton-loader');
      if (loader && !loader.classList.contains('hidden')) {
        loader.classList.add('hidden');
        console.warn('Loader hidden after safety timeout');
      }
    }, SAFETY_TIMEOUT_MS);
  </script>
</body>

</html>
