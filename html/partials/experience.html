<section class="experience-section" id="experience">
  <p class="section-label">Career</p>
  <h2 class="section-heading">Work <span>Experience</span></h2>

  <div class="exp-layout">
    <div class="exp-slider-wrap">
      <div class="exp-slides" id="expSlides"></div>
    </div>

    <div class="exp-controls" id="expControls">
      <span class="exp-counter">
        <strong id="expCurrent">01</strong>
        <span>&nbsp;/&nbsp;</span>
        <span id="expTotal">02</span>
      </span>
      <div class="exp-dots" id="expDots"></div>
      <div class="exp-arrows">
        <button class="exp-arrow" id="expPrev" aria-label="Previous">
          <img src="../../images/icons/chevron_backward.png" alt="Previous">
        </button>
        <button class="exp-arrow" id="expNext" aria-label="Next">
          <img src="../../images/icons/chevron_forward.png" alt="Next">
        </button>
      </div>
    </div>
  </div>

  <div class="exp-progress">
    <div class="exp-progress-fill" id="expProgress"></div>
  </div>
</section>
